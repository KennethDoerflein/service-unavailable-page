<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Outage - System Offline</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous" />

    <meta
      name="description"
      content="The demo server is temporarily unavailable due to a technical issue. Please try again later. We apologize for the inconvenience." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet" />

    <style>
      body {
        background-color: #fcfcfc;
        font-family: "Poppins", Arial, sans-serif;
        min-height: 100vh;
        color: #333;
      }
      .simple-card {
        background: #ffffff;
        border: 1px solid #eee;
        border-radius: 12px;
      }
      .btn-pill {
        border-radius: 50px;
        padding: 0.6rem 2.5rem;
        font-weight: 500;
        transition: opacity 0.2s;
      }
      .btn-pill:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="simple-card shadow-sm text-center p-5" style="max-width: 500px; width: 90%">
      <div class="mb-4 text-secondary" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-power" viewBox="0 0 16 16">
          <path d="M7.5 1v7h1V1z"/>
          <path d="M3 8.812a5 5 0 0 1 2.578-4.375l-.485-.874A6 6 0 1 0 11 3.616l-.501.865A5 5 0 1 1 3 8.812"/>
        </svg>
      </div>
      <h1 class="h4 fw-bold mb-3">Offline</h1>
      <p class="text-secondary mb-5">
        My server is currently without power or internet. It'll recover automatically once the outage is over, so please check again in a few minutes or later today.
      </p>
      <div class="d-grid">
        <button
          onclick="window.location.reload()"
          class="btn btn-dark btn-pill"
          aria-label="Try again">
          Try Again
        </button>
      </div>
    </div>
  </body>
</html>
